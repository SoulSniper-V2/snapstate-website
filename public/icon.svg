<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Rounded Rectangle Background -->
  <rect width="180" height="180" rx="40" fill="#141416" stroke="white" stroke-opacity="0.08" stroke-width="1.5" />
  
  <!-- Aperture Ring Group -->
  <g transform="translate(90, 90)">
    <!-- Aperture outer border -->
    <circle r="46" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.8" />
    
    <!-- Aperture Blades (rotating line strokes) -->
    <line x1="0" y1="-46" x2="39.8" y2="-23" stroke="white" stroke-width="2.5" stroke-opacity="0.7" />
    <line x1="39.8" y1="-23" x2="39.8" y2="23" stroke="white" stroke-width="2.5" stroke-opacity="0.7" />
    <line x1="39.8" y1="23" x2="0" y2="46" stroke="white" stroke-width="2.5" stroke-opacity="0.7" />
    <line x1="0" y1="46" x2="-39.8" y2="23" stroke="white" stroke-width="2.5" stroke-opacity="0.7" />
    <line x1="-39.8" y1="23" x2="-39.8" y2="-23" stroke="white" stroke-width="2.5" stroke-opacity="0.7" />
    <line x1="-39.8" y1="-23" x2="0" y2="-46" stroke="white" stroke-width="2.5" stroke-opacity="0.7" />

    <!-- Center 4-Square Grid -->
    <g transform="translate(-18, -18)">
      <!-- Top Left -->
      <rect x="2" y="2" width="13" height="13" rx="2.5" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.8" />
      <!-- Top Right (Highlighted in Cyan) -->
      <rect x="21" y="2" width="13" height="13" rx="2.5" fill="none" stroke="#3B82F6" stroke-width="2.5" />
      <!-- Bottom Left -->
      <rect x="2" y="21" width="13" height="13" rx="2.5" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.8" />
      <!-- Bottom Right -->
      <rect x="21" y="21" width="13" height="13" rx="2.5" fill="none" stroke="white" stroke-width="2" stroke-opacity="0.8" />
    </g>
  </g>
</svg>